services:
  db:
    image: postgres:17-alpine
    container_name: launchpad-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - dokploy-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: launchpad-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - dokploy-network
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: launchpad-backend
    env_file:
      - .env
    volumes:
      - static_volume:/app/public/static/
      - media_volume:/app/media/
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - dokploy-network
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.launchpad-backend.rule=Host(`portal.launchpadglobal.com.np`)
      - traefik.http.routers.launchpad-backend.entrypoints=web
      - traefik.http.routers.launchpad-backend.middlewares=redirect-to-https@file
      - traefik.http.routers.launchpad-backend.service=launchpad-backend
      - traefik.http.routers.launchpad-backend-secure.rule=Host(`portal.launchpadglobal.com.np`)
      - traefik.http.routers.launchpad-backend-secure.entrypoints=websecure
      - traefik.http.routers.launchpad-backend-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.launchpad-backend-secure.service=launchpad-backend
      - traefik.http.services.launchpad-backend.loadbalancer.server.port=8000

  nginx-static:
    image: nginx:alpine
    container_name: launchpad_nginx_static
    user: root
    volumes:
      - ./nginx/static.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/public/static/
      - media_volume:/app/media/
    networks:
      - dokploy-network
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.launchpad-static.rule=Host(`cdn.launchpadglobal.com.np`)
      - traefik.http.routers.launchpad-static.entrypoints=web
      - traefik.http.routers.launchpad-static.middlewares=redirect-to-https@file
      - traefik.http.routers.launchpad-static.service=launchpad-static
      - traefik.http.routers.launchpad-static-secure.rule=Host(`cdn.launchpadglobal.com.np`)
      - traefik.http.routers.launchpad-static-secure.entrypoints=websecure
      - traefik.http.routers.launchpad-static-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.launchpad-static-secure.service=launchpad-static
      - traefik.http.services.launchpad-static.loadbalancer.server.port=80

networks:
  dokploy-network:
    external: true

volumes:
  static_volume:
    driver: local
  media_volume:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
