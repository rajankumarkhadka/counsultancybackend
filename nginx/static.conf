server {
    listen 80;
    server_name _;

    # Static files
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/css text/javascript text/xml text/plain application/javascript application/x-javascript application/json application/xml+rss image/svg+xml;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Static files
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/css text/javascript text/xml text/plain application/javascript application/x-javascript application/json application/xml+rss image/svg+xml;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Root location (optional - for health checks)
    location / {
        return 200 "Static file server is running\n";
        add_header Content-Type text/plain;
    }
}
